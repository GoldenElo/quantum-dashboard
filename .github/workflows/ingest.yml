name: Ingestion quotidienne

on:
  schedule:
    - cron: '30 22 * * 1-5'   # lun–ven 22h30 UTC (après clôture NYSE à 16h00 ET)
  workflow_dispatch:            # relançable manuellement depuis GitHub

jobs:
  ingest:
    name: Ingestion + calcul des snapshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: Lancer l'ingestion
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/ingest.py

      - name: Signaler l'échec
        if: failure()
        run: |
          echo "::error title=Ingestion échouée::Le script ingest.py a échoué le $(date -u +%Y-%m-%d). Vérifier les logs ci-dessus."

name: Fetch shares outstanding

# Exécution manuelle uniquement — mise à jour trimestrielle des actions en circulation.
# Après exécution, vérifier le tableau de contrôle dans les logs GitHub Actions
# et surcharger manuellement si yfinance diverge d'une source primaire (SEC 10-Q, etc.).

on:
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch + upsert shares_outstanding
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: Fetch shares outstanding
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/fetch_shares.py

      - name: Signaler l'échec
        if: failure()
        run: |
          echo "::error title=Fetch shares échoué::fetch_shares.py a échoué le $(date -u +%Y-%m-%d). Vérifier les logs et relancer."
